<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Gmeet Unmirror</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <span class="dot" id="dot"></span>
      <h1>Gmeet Unmirror</h1>
    </header>

    <p class="status" id="status">Checking…</p>

    <label class="row">
      <span>Hide automatically</span>
      <span class="switch">
        <input type="checkbox" id="auto" />
        <span class="track"><span class="thumb"></span></span>
      </span>
    </label>

    <button class="btn" id="toggle" disabled>Show / hide presentation</button>

    <p class="hint">Only active while you're presenting.</p>

    <script src="popup.js"></script>
  </body>
</html>
